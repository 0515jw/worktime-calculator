<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>IGT 잔여 근로시간 계산기</title>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background-color: #f4f7f6; padding: 30px; }
        .calculator-container { background-color: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; font-size: 14px; }
        .desc { font-size: 12px; color: #7f8c8d; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        input::placeholder { color: #bdc3c7; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
        button { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #219150; }
        .result-box { margin-top: 25px; padding: 20px; background-color: #e8f8f5; border-left: 5px solid #27ae60; border-radius: 5px; display: none; line-height: 1.6; color: #2c3e50; }
        .highlight { font-size: 18px; font-weight: bold; color: #c0392b; }
        .download-guide { text-align: center; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>⏳IGT 잔여 근로시간 계산기⏳</h2>

    <div class="desc download-guide">
        근태 메뉴 → 우측 상단 '목록 다운로드' → 개인의 근태 엑셀표 다운로드
    </div>

    <div class="input-group">
        <label>1. 월 기준 근로(소정근로)시간 입력</label>
        <div class="desc">해당 월의 근무일수 x 8시간의 값을 입력하세요 (근태 바에서 점선 아래의 값)</div>
        <input type="number" id="base_hours" placeholder="160">
    </div>
    
    <div class="input-group">
        <label>2. 잔여 근무일수 입력</label>
        <div class="desc">[내 근태현황]에 뜨는 '잔여 근무일'을 입력하세요 (예: 5)</div>
        <input type="number" id="remaining_days" placeholder="5">
    </div>
    
    <div class="input-group">
        <label>3. 총 근로시간 입력</label>
        <div class="desc">엑셀(I열)에서 값 복사 (예: 120:30:00)</div>
        <input type="text" id="total_work" placeholder="00:00:00">
    </div>

    <div class="input-group">
        <label>4. 초과근로시간 입력</label>
        <div class="desc">엑셀(J열)에서 값 복사 (예: 05:00:00)</div>
        <input type="text" id="total_overtime" placeholder="00:00:00">
    </div>

    <div class="input-group">
      <label>5. 휴가시간 입력</label>
      <div class="desc">엑셀(P열)에서 값 복사 (예: 08:00:00)</div>
      <input type="text" id="total_vacation" placeholder="00:00:00">
    </div>

<hr>
    
    <button onclick="calculateHours()">결과 계산하기</button>

    <div id="result_display" class="result-box"></div>
</div>

<script>
    function timeToSeconds(timeStr) {
        if (!timeStr) return 0;
        let parts = timeStr.trim().split(':');
        if (parts.length !== 3) return 0;
        return parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseInt(parts[2]);
    }

    function secondsToTimeText(totalSeconds) {
        if (totalSeconds <= 0) return "0시간 0분 0초";
        let h = Math.floor(totalSeconds / 3600);
        let m = Math.floor((totalSeconds % 3600) / 60);
        let s = Math.floor(totalSeconds % 60);
        return `${h}시간 ${m}분 ${s}초`;
    }

    function calculateHours() {
        let base_h = parseFloat(document.getElementById('base_hours').value) || 0;
        let t_work = document.getElementById('total_work').value || "00:00:00";
        let t_vaca = document.getElementById('total_vacation').value || "00:00:00";
        let t_over = document.getElementById('total_overtime').value || "00:00:00";
        let r_days = parseInt(document.getElementById('remaining_days').value) || 0;

        let base_sec = base_h * 3600;
        let work_sec = timeToSeconds(t_work);
        let vaca_sec = timeToSeconds(t_vaca);
        let over_sec = timeToSeconds(t_over);

        let recognized_sec = (work_sec - over_sec) + vaca_sec;
        let remaining_sec = base_sec - recognized_sec;

        let resultHTML = "";

        if (remaining_sec <= 0) {
            resultHTML = "축하합니다! 이번 달 기준 근로시간을 모두 채우셨습니다.<br><strong>당신의 잔여 근로시간은 0시간 0분 0초 입니다.</strong>";
        } else {
            resultHTML = `당신의 잔여 근로시간은 <span class="highlight">${secondsToTimeText(remaining_sec)}</span> 입니다.<br><br>`;
            
            if (r_days > 0) {
                let daily_sec = remaining_sec / r_days;
                resultHTML += `앞으로 <strong>${r_days}일</strong> 동안 하루 평균 <span class="highlight">${secondsToTimeText(daily_sec)}</span> 정도를 일해야 합니다.`;
            } else {
                resultHTML += `<span style="font-size:12px; color:#7f8c8d;">* 남은 근무 일수를 입력하시면 하루 평균 필요한 근무시간도 알려드립니다.</span>`;
            }
        }

        let resultBox = document.getElementById('result_display');
        resultBox.innerHTML = resultHTML;
        resultBox.style.display = "block";
    }
</script>

</body>
</html>
