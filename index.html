
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>IGT 잔여 근로시간 계산기</title>

    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f4f7f6;
            padding: 30px;
        }

        .calculator-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .calculator-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
            font-size: 14px;
        }

        .desc {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        /* 시간/분 입력을 가로로 배치하기 위한 스타일 */
        .time-input-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-input-container input {
            width: 80px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
            text-align: right;
        }

        .time-input-container span {
            font-weight: bold;
            color: #2c3e50;
            font-size: 14px;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 25px 0;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #e8f8f5;
            border-left: 5px solid #27ae60;
            border-radius: 5px;
            display: none;
            line-height: 1.6;
            color: #2c3e50;
        }

        .highlight {
            font-size: 18px;
            font-weight: bold;
            color: #c0392b;
        }
    </style>
</head>

<body>

<div class="calculator-container">

    <h2>⏳IGT 잔여 소정 근로시간 계산기⏳</h2>

    <img src="https://github.com/user-attachments/assets/b54bef81-9e56-4ac8-bf13-bd47f76a523f" alt="근태 입력 가이드 이미지" class="calculator-image">

    <div class="input-group">
        <label>1. 월 기준 근로(소정근로)시간 입력</label>
        <div class="desc">
            해당 월의 근무일수 x 8시간의 값을 입력하세요<br>
            (근태 바에서 점선 아래의 값)
        </div>
        <div class="time-input-container">
            <input type="number" id="base_h" min="0" placeholder="0"> <span>시간</span>
            <input type="number" id="base_m" min="0" max="59" placeholder="0"> <span>분</span>
        </div>
    </div>

    <div class="input-group">
        <label>2. 소정 근로시간 입력</label>
        <div class="desc">
            [근태] → [월간] → [소정근로시간]
        </div>
        <div class="time-input-container">
            <input type="number" id="worked_h" min="0" placeholder="0"> <span>시간</span>
            <input type="number" id="worked_m" min="0" max="59" placeholder="0"> <span>분</span>
        </div>
    </div>

    <div class="input-group">
        <label>3. 휴가 입력</label>
        <div class="desc">
            [근태] → [월간] → [휴가]
        </div>
        <div class="time-input-container">
            <input type="number" id="vaca_h" min="0" placeholder="0"> <span>시간</span>
            <input type="number" id="vaca_m" min="0" max="59" placeholder="0"> <span>분</span>
        </div>
    </div>

    <div class="input-group">
        <label>4. 잔여 근무일수 입력</label>
        <div class="desc">
            [근태] → [잔여 근무일] (예: 5)
        </div>
        <div class="time-input-container">
            <input type="number" id="r_days" min="0" placeholder="0" style="width: 100px;"> <span>일</span>
        </div>
    </div>

    <hr>

    <button onclick="calculateHours()">
        결과 계산하기
    </button>

    <div id="result_display" class="result-box">
    </div>

</div>

<script>
// 초(second)를 시간, 분, 초 텍스트로 변환하는 함수
function secondsToTimeText(totalSeconds) {
    if (totalSeconds <= 0) {
        return "0시간 0분 0초";
    }

    let h = Math.floor(totalSeconds / 3600);
    let m = Math.floor((totalSeconds % 3600) / 60);
    let s = Math.floor(totalSeconds % 60);

    return `${h}시간 ${m}분 ${s}초`;
}

function calculateHours() {
    // 1. 월 기준 근로시간 가져오기 (초 단위 변환)
    let base_h = parseInt(document.getElementById('base_h').value) || 0;
    let base_m = parseInt(document.getElementById('base_m').value) || 0;
    let base_sec = (base_h * 3600) + (base_m * 60);

    // 2. 소정 근로시간 가져오기 (초 단위 변환)
    let worked_h = parseInt(document.getElementById('worked_h').value) || 0;
    let worked_m = parseInt(document.getElementById('worked_m').value) || 0;
    let worked_sec = (worked_h * 3600) + (worked_m * 60);

    // 3. 휴가 시간 가져오기 (초 단위 변환)
    let vaca_h = parseInt(document.getElementById('vaca_h').value) || 0;
    let vaca_m = parseInt(document.getElementById('vaca_m').value) || 0;
    let vaca_sec = (vaca_h * 3600) + (vaca_m * 60);

    // 4. 잔여 근무일수 가져오기
    let r_days = parseInt(document.getElementById('r_days').value) || 0;

    /*
        최종 계산식: 
        잔여 근로시간 = 월 소정근로시간 - 소정근로시간 - 휴가
    */
    let remaining_sec = base_sec - worked_sec - vaca_sec;

    let resultHTML = "";

    if (remaining_sec <= 0) {
        resultHTML =
            "축하합니다! 이번 달 기준 근로시간을 모두 채우셨습니다.<br>" +
            "<strong>당신의 잔여 근로시간은 0시간 0분 0초 입니다.</strong>";
    } else {
        resultHTML =
            `당신의 잔여 근로시간은 ` +
            `<span class="highlight">${secondsToTimeText(remaining_sec)}</span>` +
            ` 입니다.<br><br>`;

        if (r_days > 0) {
            let daily_sec = remaining_sec / r_days;
            resultHTML +=
                `앞으로 <strong>${r_days}일</strong> 동안 하루 평균 ` +
                `<span class="highlight">${secondsToTimeText(daily_sec)}</span>` +
                ` 정도를 일해야 합니다.`;
        } else {
            resultHTML +=
                `<span style="font-size:12px; color:#7f8c8d;">` +
                `* 잔여 근무일수를 입력하시면 하루 평균 필요한 근무시간도 알려드립니다.` +
                `</span>`;
        }
    }

    let resultBox = document.getElementById('result_display');
    resultBox.innerHTML = resultHTML;
    resultBox.style.display = "block";
}
</script>

</body>
</html>

```
